services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acessa-plus-postgres
    environment:
      POSTGRES_USER: acessa
      POSTGRES_PASSWORD: acessa
      POSTGRES_DB: acessa_plus
    ports:
      - "5432:5432"
    volumes:
      - acessa_plus_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acessa -d acessa_plus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acessa-plus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  acessa_plus_postgres:
